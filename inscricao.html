<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces Delírio - Confeitaria Artesanal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="logo-circle">
                <span class="logo-icon">🧁</span>
            </div>
            <div class="spinner"></div>
            <p>Preparando doçuras...</p>
        </div>
        <audio id="loader-audio" src="doce.mp3" autoplay loop></audio>
    </div>

    <header class="cabecalho">
        <div class="menu-mobile">☰</div>
        <div class="logo-container">
            <div class="logo-mini"></div>
            <h1 class="logo-texto">Doces Delírio</h1>
        </div>
        <div class="search-icon">🔍</div>
    </header>

    <section class="banner">
        <div class="overlay"></div>
        <div class="banner-content">
            <h2>Receitas de Bolos</h2>
            <p>O toque artesanal que sua cozinha merece</p>
        </div>
    </section>

    <nav class="categorias">
        <button class="btn-filtro active">Todos</button>
        <button class="btn-filtro">Chocolate</button>
        <button class="btn-filtro">Fitness</button>
        <button class="btn-filtro">Caseiro</button>
    </nav>

    <main class="grid-receitas">
        <div class="card">
            <div class="card-img" style="background-image: url('bolo1.jpg');">
                <span class="tag-cat">Fitness</span>
            </div>
            <div class="card-info">
                <h3>Bolo de Aveia e Mel</h3>
                <button class="btn-card">Eu quero</button>
            </div>
        </div>

        <div class="card">
            <div class="card-img" style="background-image: url('bolo2.jpg');">
                <span class="tag-cat">Chocolate</span>
            </div>
            <div class="card-info">
                <h3>Delírio de Cacau</h3>
                <button class="btn-card">Eu quero</button>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("loader");
            setTimeout(() => {
                loader.style.display = "none";
            }, 3000); // Fecha após 3 segundos
        });
    </script>
</body>
</html>
