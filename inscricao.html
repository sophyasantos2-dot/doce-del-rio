<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces Delírio | Receitas Artesanais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="logo-circle">
                <span class="emoji-logo">🧁</span>
            </div>
            <div class="spinner"></div>
            <p class="loading-text">Preparando doçuras...</p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <header class="cabecalho">
            <div class="menu-icon">☰</div>
            <h1 class="brand-name">Doces Delírio</h1>
            <div class="user-icon">👤</div>
        </header>

        <section class="hero-banner">
            <div class="overlay"></div>
            <div class="banner-text">
                <h2>Receitas de Bolos</h2>
                <p>O sabor da confeitaria na sua casa</p>
            </div>
        </section>

        <nav class="categories-nav">
            <button class="cat-btn active">Todos</button>
            <button class="cat-btn">Chocolate</button>
            <button class="cat-btn">Fitness</button>
            <button class="cat-btn">Caseiro</button>
        </nav>

        <main class="recipe-grid">
            <div class="recipe-card">
                <div class="recipe-thumb" style="background-image: url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=400&q=80');">
                    <span class="badge">Fitness</span>
                </div>
                <div class="recipe-info">
                    <h3>Bolo de Aveia e Mel</h3>
                    <button class="action-btn">Eu quero</button>
                </div>
            </div>
            <div class="recipe-card">
                <div class="recipe-thumb" style="background-image: url('https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62?auto=format&fit=crop&w=400&q=80');">
                    <span class="badge">Chocolate</span>
                </div>
                <div class="recipe-info">
                    <h3>Delírio de Ganache</h3>
                    <button class="action-btn">Eu quero</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Simulação de carregamento
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                }, 500);
            }, 2500); // 2.5 segundos de loading
        });
    </script>
</body>
</html>
